services:
  db:
    image: postgres:15
    container_name: hotel-db-container
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: banco123
    ports:
      - "5433:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hotel_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hotel-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: hotel-messenger
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel-network

  hospede-service:
    build: ./hospede-service
    container_name: ms-hospede
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user_hospede:pass_hospede@db:5432/hotel_db?options=-csearch_path%3Dschema_hospede
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      - hotel-network

  quarto-service:
    build: ./quarto-service
    container_name: ms-quarto
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user_quarto:pass_quarto@db:5432/hotel_db?options=-csearch_path%3Dschema_quarto
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      - hotel-network

  reserva-service:
    build: ./reserva-service
    container_name: ms-reserva
    volumes:
      - ./reserva-service:/app
    ports:
      - "8003:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user_reserva:pass_reserva@db:5432/hotel_db?options=-csearch_path%3Dschema_reserva
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      - hotel-network

  hospedagem-service:
    build: ./hospedagem-service
    container_name: ms-hospedagem
    ports:
      - "8004:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user_hospedagem:pass_hospedagem@db:5432/hotel_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      - hotel-network

  limpeza-service:
    build: ./limpeza-service
    container_name: ms-limpeza
    ports:
      - "8005:8000"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user_limpeza:pass_limpeza@db:5432/hotel_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      - hotel-network

  gateway:
    image: nginx:latest
    container_name: hotel-gateway
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - hospede-service
      - quarto-service
      - reserva-service
      - hospedagem-service
      - limpeza-service
    networks:
      - hotel-network

networks:
  hotel-network:
    driver: bridge

volumes:
  postgres_data: