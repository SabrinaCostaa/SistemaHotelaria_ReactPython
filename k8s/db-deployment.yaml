apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.31.2 (a92241f79)
  creationTimestamp: null
  labels:
    io.kompose.service: db
  name: db
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: db
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.31.2 (a92241f79)
      creationTimestamp: null
      labels:
        io.kompose.network/backend-hotel-network: "true"
        io.kompose.service: db
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: hotel_db
            - name: POSTGRES_PASSWORD
              value: banco123
            - name: POSTGRES_USER
              value: admin
          image: postgres:15
          livenessProbe:
            exec:
              command:
                - pg_isready -U admin -d hotel_db
            failureThreshold: 5
            periodSeconds: 5
            timeoutSeconds: 5
          name: hotel-db-container
          ports:
            - containerPort: 5432
              hostPort: 5433
              protocol: TCP
          resources: {}
          volumeMounts:
            - mountPath: /docker-entrypoint-initdb.d/init-db.sql
              name: db-claim0
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
      restartPolicy: Always
      volumes:
        - name: db-claim0
          persistentVolumeClaim:
            claimName: db-claim0
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
status: {}
