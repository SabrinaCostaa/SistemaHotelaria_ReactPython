apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    io.kompose.service: hospedagem-service
  name: hospedagem-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: hospedagem-service
  template:
    metadata:
      labels:
        io.kompose.service: hospedagem-service
    spec:
      containers:
        - env:
            - name: DATABASE_URL
              value: postgresql://user_hospedagem:pass_hospedagem@db:5432/hotel_db
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          image: backend-hospedagem_service:latest 
          name: ms-hospedagem
          imagePullPolicy: IfNotPresent 
          ports:
            - containerPort: 8000
              protocol: TCP